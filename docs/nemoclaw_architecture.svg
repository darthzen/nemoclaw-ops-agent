<svg viewBox="0 0 1240 840" xmlns="http://www.w3.org/2000/svg" role="img" style="background: #0f172a; border-radius: 12px;">
  <title>NemoClaw Ops Agent — Autonomous Delivery &amp; Runtime Operations on k3s</title>
  <desc>Architecture of a self-hosted OpenClaw/NemoClaw autonomous ops agent on OpenShell, deployed k8s-native on the ash4d k3s cluster: privileged sandbox isolated by NetworkPolicy egress-lock, on-prem inference to Ollama, human-in-the-loop approval over Slack, staged autonomy ladder.</desc>

  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <!-- Title -->
  <text x="620" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="23" font-weight="700" letter-spacing="0.4">NemoClaw Ops Agent — Autonomous Delivery &amp; Runtime Operations</text>
  <text x="620" y="63" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12.5">k3s-native OpenClaw on NVIDIA OpenShell · on-prem inference · egress-locked privileged sandbox · human-in-the-loop over Slack</text>

  <!-- legend -->
  <circle cx="905" cy="86" r="5" fill="#22c55e"/><text x="915" y="90" fill="#86efac" font-family="system-ui" font-size="11">live</text>
  <circle cx="965" cy="86" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/><text x="975" y="90" fill="#fde047" font-family="system-ui" font-size="11">planned</text>

  <!-- ===== OPERATOR PLANE (Slack) ===== -->
  <rect x="30" y="78" width="330" height="70" rx="9" fill="#2a1e0e" stroke="#d97706" stroke-width="1.2"/>
  <text x="48" y="100" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="700">OPERATOR PLANE</text>
  <text x="48" y="120" fill="#fde68a" font-family="system-ui" font-size="12" font-weight="600">Slack — approval + conversational ops</text>
  <text x="48" y="137" fill="#a8935f" font-family="system-ui" font-size="10">Socket Mode · @mention = act now · #2085 gate</text>
  <circle cx="345" cy="92" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>

  <!-- ===== CONTROL PLANE: two namespaces ===== -->
  <!-- openshell ns -->
  <rect x="30" y="168" width="580" height="180" rx="10" fill="#141d33" stroke="#2563eb" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="48" y="190" fill="#60a5fa" font-family="system-ui" font-size="12" font-weight="700">ns: openshell  ·  control plane</text>

  <rect x="48" y="202" width="300" height="128" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="223" fill="#93c5fd" font-family="system-ui" font-size="13" font-weight="700">OpenShell Gateway</text>
  <circle cx="335" cy="217" r="5" fill="#22c55e"/>
  <text x="60" y="243" fill="#cbd5e1" font-family="system-ui" font-size="10.5">StatefulSet · mTLS + PKI hooks · JWT mint</text>
  <text x="60" y="260" fill="#cbd5e1" font-family="system-ui" font-size="10.5">L7 Privacy Router — strips/injects creds</text>
  <text x="60" y="277" fill="#cbd5e1" font-family="system-ui" font-size="10.5">Kubernetes compute driver (agents.x-k8s.io)</text>
  <text x="60" y="294" fill="#cbd5e1" font-family="system-ui" font-size="10.5">Inference routing → local Ollama</text>
  <text x="60" y="313" fill="#7f9cc0" font-family="system-ui" font-size="9.5">auth: dev-principal (lab) → OIDC (prod)</text>

  <rect x="362" y="202" width="230" height="128" rx="7" fill="#16233f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.8"/>
  <text x="374" y="223" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="700">agent-sandbox controller</text>
  <circle cx="579" cy="217" r="5" fill="#22c55e"/>
  <text x="374" y="243" fill="#cbd5e1" font-family="system-ui" font-size="10.5">ns: agent-sandbox-system</text>
  <text x="374" y="260" fill="#cbd5e1" font-family="system-ui" font-size="10.5">Sandbox CRD v1beta1 → pods</text>
  <text x="374" y="277" fill="#cbd5e1" font-family="system-ui" font-size="10.5">stateful singleton + PVC</text>
  <text x="374" y="298" fill="#7f9cc0" font-family="system-ui" font-size="9.5">kubernetes-sigs/agent-sandbox v0.5.0</text>

  <!-- nemoclaw ns (restricted control-plane) -->
  <rect x="630" y="168" width="580" height="180" rx="10" fill="#151f1a" stroke="#059669" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="648" y="190" fill="#34d399" font-family="system-ui" font-size="12" font-weight="700">ns: nemoclaw  ·  PSA restricted  ·  control plane</text>

  <rect x="648" y="202" width="180" height="60" rx="7" fill="#1e3a36" stroke="#059669" stroke-width="1"/>
  <text x="660" y="222" fill="#6ee7b7" font-family="system-ui" font-size="11.5" font-weight="700">Least-priv RBAC</text>
  <text x="660" y="239" fill="#a7d9c6" font-family="system-ui" font-size="9.5">sa-nemoclaw-observe (cluster RO)</text>
  <text x="660" y="253" fill="#a7d9c6" font-family="system-ui" font-size="9.5">sa-nemoclaw-deploy (ns-admin) · 20/20</text>
  <circle cx="815" cy="216" r="5" fill="#22c55e"/>

  <rect x="842" y="202" width="160" height="60" rx="7" fill="#1e3a36" stroke="#059669" stroke-width="1"/>
  <text x="854" y="222" fill="#6ee7b7" font-family="system-ui" font-size="11.5" font-weight="700">Audit store</text>
  <text x="854" y="239" fill="#a7d9c6" font-family="system-ui" font-size="9.5">what/why/outcome</text>
  <text x="854" y="253" fill="#a7d9c6" font-family="system-ui" font-size="9.5">append-only · Longhorn PVC</text>
  <circle cx="989" cy="216" r="5" fill="#22c55e"/>

  <rect x="1016" y="202" width="176" height="60" rx="7" fill="#241a3a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1028" y="222" fill="#c4b5fd" font-family="system-ui" font-size="11.5" font-weight="700">Milvus memory</text>
  <text x="1028" y="239" fill="#b9a7e0" font-family="system-ui" font-size="9.5">incident recall (RAG)</text>
  <text x="1028" y="253" fill="#8b7bb5" font-family="system-ui" font-size="9.5">&quot;similar to Jun-12 Longhorn…&quot;</text>
  <circle cx="1179" cy="216" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>

  <rect x="648" y="276" width="544" height="58" rx="7" fill="#101a26" stroke="#334155" stroke-width="1"/>
  <text x="662" y="296" fill="#cbd5e1" font-family="system-ui" font-size="11" font-weight="700">Credential scoping (the safety contract)</text>
  <text x="662" y="314" fill="#94a3b8" font-family="system-ui" font-size="10">Agents only ever hold SA-token kubeconfigs + a repo-scoped fine-grained PAT.</text>
  <text x="662" y="328" fill="#94a3b8" font-family="system-ui" font-size="10">Admin kubeconfig / classic PAT never reach an agent. Negative auth-can-i tests gate acceptance.</text>

  <!-- ===== SANDBOX PLANE (privileged + egress-lock) ===== -->
  <rect x="30" y="368" width="1180" height="150" rx="10" fill="#1a1526" stroke="#a855f7" stroke-width="1.4" stroke-opacity="0.75"/>
  <text x="48" y="390" fill="#c084fc" font-family="system-ui" font-size="12" font-weight="700">ns: nemoclaw-sandboxes  ·  PSA privileged  ·  isolated by NetworkPolicy egress-lock</text>

  <!-- egress-lock dashed frame -->
  <rect x="48" y="400" width="470" height="104" rx="8" fill="none" stroke="#f43f5e" stroke-width="1.4" stroke-dasharray="7,4"/>
  <text x="60" y="418" fill="#fb7185" font-family="system-ui" font-size="10.5" font-weight="700">default-deny egress-lock</text>

  <rect x="66" y="426" width="434" height="66" rx="7" fill="#2d1f4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="80" y="446" fill="#ddd6fe" font-family="system-ui" font-size="12.5" font-weight="700">OpenClaw Agent Sandbox (pod)</text>
  <circle cx="487" cy="440" r="5" fill="#22c55e"/>
  <text x="80" y="465" fill="#c4b5fd" font-family="system-ui" font-size="10">supervisor: Landlock + seccomp + netns  ·  agent: plan → tool-use → reflect → audit</text>
  <text x="80" y="482" fill="#9a86c9" font-family="system-ui" font-size="9.5">privileged by design: runAsUser 0 · caps SYS_ADMIN/NET_ADMIN/SYS_PTRACE · Unconfined</text>

  <!-- egress pinholes -->
  <text x="548" y="414" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="700">Egress allowlist (only):</text>
  <text x="548" y="434" fill="#86efac" font-family="system-ui" font-size="10.5">✔ DNS   ✔ Ollama :11434   ✔ mcpo :8000</text>
  <text x="548" y="452" fill="#86efac" font-family="system-ui" font-size="10.5">✔ gateway :8080   ✔ Slack :443</text>
  <text x="548" y="472" fill="#fca5a5" font-family="system-ui" font-size="10.5">✗ LAN / cluster-API 192.168.7.149:6443 — BLOCKED</text>
  <text x="548" y="492" fill="#64748b" font-family="system-ui" font-size="9.5">proven from inside the running pod · even root can’t reach the LAN</text>

  <!-- windowed hardening -->
  <rect x="930" y="404" width="262" height="100" rx="8" fill="#101a26" stroke="#334155" stroke-width="1"/>
  <text x="944" y="423" fill="#cbd5e1" font-family="system-ui" font-size="10.5" font-weight="700">Windowed hardening (added layers)</text>
  <text x="944" y="443" fill="#94a3b8" font-family="system-ui" font-size="10">node SELinux (Landlock active today)</text>
  <text x="944" y="461" fill="#94a3b8" font-family="system-ui" font-size="10">kata / gVisor runtimeClass microVM</text>
  <text x="944" y="479" fill="#94a3b8" font-family="system-ui" font-size="10">OIDC gateway auth for production</text>
  <circle cx="1179" cy="418" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>

  <!-- ===== DATA / TOOL / SIGNAL PLANE ===== -->
  <rect x="30" y="538" width="1180" height="118" rx="10" fill="#141d33" stroke="#2563eb" stroke-width="1" stroke-opacity="0.55"/>
  <text x="48" y="560" fill="#60a5fa" font-family="system-ui" font-size="12" font-weight="700">DATA · TOOLS · SIGNALS  (all on-prem — zero data egress)</text>

  <rect x="48" y="572" width="196" height="70" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="592" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="700">Ollama · Qwen3</text>
  <text x="60" y="610" fill="#cbd5e1" font-family="system-ui" font-size="10">routed inference</text>
  <text x="60" y="627" fill="#f59e0b" font-family="system-ui" font-size="9.5" font-weight="600">Tesla V100 · zero egress</text>

  <rect x="256" y="572" width="300" height="70" rx="7" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="268" y="592" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="700">Least-privilege MCP tools</text>
  <text x="268" y="610" fill="#cbd5e1" font-family="system-ui" font-size="10">mcpo · k8s MCP (read-only) — native HTTP/SSE</text>
  <text x="268" y="627" fill="#94a3b8" font-family="system-ui" font-size="10">Prometheus MCP (giantswarm) · CRD tools ○</text>

  <rect x="568" y="572" width="624" height="70" rx="7" fill="#1a2a2e" stroke="#0891b2" stroke-width="1"/>
  <text x="580" y="592" fill="#67e8f9" font-family="system-ui" font-size="12" font-weight="700">Signals watched (detect → correlate → diagnose)</text>
  <text x="580" y="611" fill="#a5d8e6" font-family="system-ui" font-size="10.5">cert-manager expiry (MVP)   ·   Longhorn volumes   ·   Prometheus / Alertmanager</text>
  <text x="580" y="629" fill="#a5d8e6" font-family="system-ui" font-size="10.5">Fleet bundle sync   ·   GPU / DCGM   ·   pod crash-loops</text>

  <!-- ===== AUTONOMY LADDER ===== -->
  <rect x="30" y="676" width="1180" height="118" rx="10" fill="#101625" stroke="#334155" stroke-width="1.2"/>
  <text x="48" y="698" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="700">AUTONOMY LADDER  (documented, staged)</text>

  <rect x="48" y="710" width="372" height="68" rx="7" fill="#14241c" stroke="#22c55e" stroke-width="1.2"/>
  <text x="62" y="731" fill="#4ade80" font-family="system-ui" font-size="12" font-weight="700">v1 — read + annotate</text>
  <circle cx="405" cy="724" r="5" fill="#22c55e"/>
  <text x="62" y="749" fill="#a7d9c6" font-family="system-ui" font-size="10">diagnose · correlate · open issues · audit</text>
  <text x="62" y="766" fill="#a7d9c6" font-family="system-ui" font-size="10">every mutation requires approval  (ships here)</text>

  <rect x="434" y="710" width="372" height="68" rx="7" fill="#1e1a0e" stroke="#eab308" stroke-width="1.1"/>
  <text x="448" y="731" fill="#fde047" font-family="system-ui" font-size="12" font-weight="700">v2 — approval-gated mutations</text>
  <circle cx="791" cy="724" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>
  <text x="448" y="749" fill="#d9c98f" font-family="system-ui" font-size="10">Fleet re-sync · cert renewal · restarts</text>
  <text x="448" y="766" fill="#d9c98f" font-family="system-ui" font-size="10">agent proposes → human approves on Slack</text>

  <rect x="820" y="710" width="372" height="68" rx="7" fill="#1e1220" stroke="#a855f7" stroke-width="1.1"/>
  <text x="834" y="731" fill="#c084fc" font-family="system-ui" font-size="12" font-weight="700">v3 — allowlisted autonomous heal</text>
  <circle cx="1177" cy="724" r="5" fill="none" stroke="#eab308" stroke-width="1.5"/>
  <text x="834" y="749" fill="#c4b5fd" font-family="system-ui" font-size="10">self-heal with auto-rollback</text>
  <text x="834" y="766" fill="#c4b5fd" font-family="system-ui" font-size="10">post-hoc notification · the end state</text>

  <!-- flow arrows -->
  <line x1="195" y1="148" x2="195" y2="200" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr)" stroke-opacity="0.7"/>
  <text x="205" y="176" fill="#64748b" font-family="system-ui" font-size="9">approve / ask</text>
  <line x1="198" y1="330" x2="240" y2="424" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arr)" stroke-opacity="0.6"/>
  <line x1="300" y1="504" x2="180" y2="570" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)" stroke-opacity="0.5"/>
  <text x="620" y="826" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="9.5">github.com/darthzen/nemoclaw-ops-agent  ·  public board (Project #3)  ·  built by scoped AI agents under agent-build-tools  ·  runs on the ash4d k3s lab</text>
