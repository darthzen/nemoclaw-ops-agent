# DNS is the one thing every other egress rule depends on. Pinned to the
# cluster kube-dns service (UDP+TCP 53).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-dns
  namespace: nemoclaw
  labels:
    app.kubernetes.io/part-of: nemoclaw-ops-agent
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
